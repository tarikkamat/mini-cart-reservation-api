name: mini-cart-reservation

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-cart-reservation-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      CONTAINER_ROLE: app
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: mini-cart-reservation-nginx:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    image: mini-cart-reservation-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      CONTAINER_ROLE: queue
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    image: mini-cart-reservation-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mini_cart}
      POSTGRES_USER: ${DB_USERNAME:-mini_cart}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mini_cart} -d ${DB_DATABASE:-mini_cart}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  postgres-data:
  redis-data:
  app-storage:

networks:
  app:
    driver: bridge
